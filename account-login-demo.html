  <meta name="generator" content="Perplexity Computer">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Demo — Scōp</title>
  <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="style.css">

  <style>
    .demo-main {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-10) var(--space-6);
    }

    .demo-card {
      width: 100%;
      max-width: 480px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-10);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    .demo-card__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--color-accent);
      margin-bottom: var(--space-1);
    }

    .demo-card__heading {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--color-text);
      letter-spacing: -0.02em;
    }

    .demo-card__desc {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    .demo-divider {
      height: 1px;
      background: var(--color-border);
    }

    .demo-options {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .demo-option {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding: var(--space-5) var(--space-6);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      text-align: left;
      font-family: var(--font-body);
      transition: border-color var(--transition-interactive), background var(--transition-interactive);
    }

    .demo-option:hover {
      border-color: var(--color-accent);
      background: color-mix(in srgb, var(--color-accent) 4%, var(--color-bg));
    }

    .demo-option__label {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .demo-option__badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: var(--radius-full);
    }

    .demo-option__badge--sub {
      background: rgba(74, 222, 128, 0.12);
      color: #4ade80;
    }

    .demo-option__badge--one {
      background: rgba(193, 127, 62, 0.12);
      color: var(--color-accent);
    }

    .demo-option__desc {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      line-height: 1.5;
    }

    .demo-option__features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      padding-top: var(--space-2);
      border-top: 1px solid var(--color-border-subtle);
    }

    .demo-option__features li {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      max-width: 100%;
    }

    .demo-option__features li::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--color-border);
      flex-shrink: 0;
    }

    .demo-option__features li.feature-on::before {
      background: var(--color-accent);
    }

    .demo-status {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      text-align: center;
      font-style: italic;
    }

    .demo-status a {
      color: var(--color-text-faint);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .demo-status a:hover {
      color: var(--color-text-muted);
    }

    @media (max-width: 480px) {
      .demo-card {
        padding: var(--space-8) var(--space-5);
      }
    }
  </style>
</head>
<body>

  <main class="demo-main">
    <div class="demo-card">
      <div>
        <div class="demo-card__eyebrow">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Demo helper
        </div>
        <h1 class="demo-card__heading">Account Preview</h1>
        <p class="demo-card__desc" style="margin-top:var(--space-3);">This page sets your account state in localStorage for testing the Scōp customer portal. Choose an account type to be taken directly to the dashboard.</p>
      </div>

      <div class="demo-divider" role="separator"></div>

      <div class="demo-options">
        <button class="demo-option" id="btn-subscription" onclick="loginAs('subscription')">
          <div class="demo-option__label">
            Subscription Customer
            <span class="demo-option__badge demo-option__badge--sub">Active</span>
          </div>
          <p class="demo-option__desc">Full access to all account features, including active subscription management and the Longevity Hub.</p>
          <ul class="demo-option__features" role="list">
            <li class="feature-on">Overview with delivery and billing dates</li>
            <li class="feature-on">Subscription management tab (pause / cancel)</li>
            <li class="feature-on">Longevity Hub — full access</li>
            <li class="feature-on">Order history</li>
          </ul>
        </button>

        <button class="demo-option" id="btn-one-time" onclick="loginAs('one-time')">
          <div class="demo-option__label">
            One-Time Customer
            <span class="demo-option__badge demo-option__badge--one">One-time</span>
          </div>
          <p class="demo-option__desc">Standard account access. Subscription tab is hidden; Longevity Hub shows the locked upgrade prompt.</p>
          <ul class="demo-option__features" role="list">
            <li class="feature-on">Overview with status card</li>
            <li style="opacity:0.4">Subscription management tab — hidden</li>
            <li style="opacity:0.4">Longevity Hub — locked (upgrade prompt)</li>
            <li class="feature-on">Order history</li>
          </ul>
        </button>
      </div>

      <p class="demo-status" id="demo-current">
        Current state: <span id="state-label">not set</span> ·
        <a href="account.html">Go to account</a>
      </p>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    // Show current state
    function updateStatus() {
      const loggedIn = localStorage.getItem('scop_logged_in');
      const type = localStorage.getItem('scop_account_type');
      const stateLabel = document.getElementById('state-label');
      if (loggedIn === 'true' && type) {
        stateLabel.textContent = type + ' customer (logged in)';
        stateLabel.style.color = 'var(--color-accent)';
      } else {
        stateLabel.textContent = 'not logged in';
      }
    }

    function loginAs(type) {
      localStorage.setItem('scop_logged_in', 'true');
      localStorage.setItem('scop_account_type', type);
      localStorage.setItem('scop_user_name', 'Alex');
      window.location.href = 'account.html';
    }

    updateStatus();
  </script>
</body>
</html>
